function buildTabs() {
  const groups = ['All', ...YEAR_ORDER.filter(y => PLAYERS.some(p => p.year === y))];
  document.getElementById('group-tabs').innerHTML = groups.map(g =>
    `<button class="tab-btn ${g===currentGroup?'active':''}" onclick="setGroup('${g}')">${g}</button>`
  ).join('');
}

function setGroup(g) { currentGroup = g; buildTabs(); renderList(); }

function calcAge(dob) {
  if (!dob) return '';
  const [d, m, y] = dob.split('/');
  const birth = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  if (now < new Date(now.getFullYear(), birth.getMonth(), birth.getDate())) age--;
  return age;
}

function renderList() {
  const container = document.getElementById('player-list');
  const filter = document.getElementById('search-input').value.toLowerCase();
  let players = currentGroup === 'All' ? [...PLAYERS] : PLAYERS.filter(p => p.year === currentGroup);
  if(filter) players = players.filter(p => p.name.toLowerCase().includes(filter));
  const sessionWalkins = walkins.filter(w => w.sessionIdx === currentSession);
  const all = [...players, ...sessionWalkins];

  if(!all.length) { container.innerHTML = '<div class="no-results">No players found</div>'; updateStats(); return; }

  container.innerHTML = all.map((p,i) => {
    const status = attendance[currentSession][p.id] || 'absent';
    const exp = expandedCards.has(p.id);
    return `<div class="player-card-wrap">
      <div class="player-card ${status}${exp?' has-detail':''}" id="card-${p.id}">
        <div class="player-number">${i+1}</div>
        <div class="status-icon ${status}">${status==='present'?'✅':'⚪'}</div>
        <div class="player-info">
          <div class="player-name">${p.name}${p.walkin?'<span class="walkin-badge">WALK-IN</span>':''}</div>
          <div class="player-meta">Age: ${calcAge(p.dob)||'—'} · ${p.parent||''}</div>
        </div>
        <button class="expand-btn" onclick="toggleExpand(${p.id})" title="View details">${exp?'▲':'▼'}</button>
        ${status==='absent'
          ? `<button class="attendance-btn mark-present" onclick="mark(${p.id},'present')">Mark Present</button>`
          : `<button class="attendance-btn mark-absent"  onclick="mark(${p.id},'absent')">Mark Absent</button>`}
      </div>
      <div class="detail-panel ${exp?'open':''}" id="detail-${p.id}">
        <div class="detail-item"><strong>Age</strong>${calcAge(p.dob)||'—'}</div>
        <div class="detail-item"><strong>Date of Birth</strong>${p.dob||'—'}</div>
        <div class="detail-item"><strong>Parent / Guardian</strong>${p.parent||'—'}</div>
        <div class="detail-item"><strong>Contact Number</strong>${p.parentTel||'—'}</div>
        <div class="detail-item"><strong>Email</strong>${p.parentEmail||'—'}</div>
        <div class="detail-item"><strong>Emergency Contact</strong>${p.emergency||p.parent||'—'}${p.emergencyTel?' · '+p.emergencyTel:(p.parentTel?' · '+p.parentTel:'')}</div>
        ${p.medical?`<div class="detail-item" style="grid-column:1/-1"><strong>⚕ Medical Notes</strong>${p.medical}</div>`:''}
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function toggleExpand(id) { expandedCards.has(id)?expandedCards.delete(id):expandedCards.add(id); renderList(); }

function mark(id, status) { attendance[currentSession][id] = status; renderList(); showToast(status==='present'?'✅ Marked present':'⚪ Marked absent'); }

function updateStats() {
  const sess = currentSession;
  const wIds = walkins.filter(w => w.sessionIdx===sess).map(w => w.id);
  const all = [...PLAYERS.map(p=>p.id), ...wIds];
  document.getElementById('stat-total').textContent   = PLAYERS.length;
  document.getElementById('stat-present').textContent = all.filter(id => attendance[sess][id]==='present').length;
  document.getElementById('stat-absent').textContent  = all.filter(id => attendance[sess][id]==='absent').length;
  document.getElementById('stat-walkins').textContent = wIds.length;
}

function toggleWalkin() {
  document.getElementById('walkin-form').classList.toggle('open');
  document.getElementById('toggle-arrow').classList.toggle('open');
}

function addWalkin() {
  const name = document.getElementById('wi-name').value.trim();
  if(!name) { showToast('⚠️ Full name is required'); return; }
  const dobRaw = document.getElementById('wi-dob').value;
  const id = nextWalkinId++;
  walkins.push({ id, name, walkin:true, sessionIdx:currentSession,
    dob: dobRaw ? new Date(dobRaw).toLocaleDateString('en-GB') : '',
    year:         document.getElementById('wi-year').value.trim(),
    parent:       document.getElementById('wi-parent').value.trim(),
    parentTel:    document.getElementById('wi-parent-tel').value.trim(),
    parentEmail:  document.getElementById('wi-parent-email').value.trim(),
    emergency:    document.getElementById('wi-emergency-name').value.trim(),
    emergencyTel: document.getElementById('wi-emergency-tel').value.trim(),
    medical:      document.getElementById('wi-medical').value.trim(),
  });
  attendance[currentSession][id] = 'present';
  ['wi-name','wi-dob','wi-year','wi-parent','wi-parent-tel','wi-parent-email','wi-emergency-name','wi-emergency-tel','wi-medical']
    .forEach(f => document.getElementById(f).value = '');
  renderList();
  showToast('✅ Walk-in added & marked present');
}

function exportCSV() {
  const sess = currentSession;
  const label = `Session ${sess+1} - ${SESSIONS[sess]}`;
  const rows = [['Session','Name','Type','Status','School Year','DOB','Parent','Parent Tel','Parent Email','Emergency','Emergency Tel','Medical Notes']];
  PLAYERS.forEach(p => rows.push([label,p.name,'Registered',attendance[sess][p.id],p.year,p.dob,p.parent,p.parentTel,p.parentEmail,p.emergency,p.emergencyTel,p.medical]));
  walkins.filter(w => w.sessionIdx===sess).forEach(p => rows.push([label,p.name,'Walk-in',attendance[sess][p.id],p.year,p.dob,p.parent,p.parentTel,p.parentEmail,p.emergency,p.emergencyTel,p.medical]));
  const csv = rows.map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {href: URL.createObjectURL(new Blob([csv],{type:'text/csv'})), download:`HarrowTownCC_Session${sess+1}_${SESSIONS[sess].replace(/ /g,'-')}.csv`});
  a.click();
  showToast('⬇️ CSV exported');
}

function resetSession() {
  if(!confirm(`Reset attendance for Session ${currentSession+1} (${SESSIONS[currentSession]})?`)) return;
  PLAYERS.forEach(p => attendance[currentSession][p.id] = 'absent');
  walkins = walkins.filter(w => w.sessionIdx !== currentSession);
  expandedCards.clear(); renderList();
  showToast('🔄 Session reset');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
