name: Export HTCC Juniors Sessions to Google Drive

on:
  workflow_dispatch:          # Allows you to run it manually from the Actions tab
  # schedule:
  #   - cron: '0 17 * * *'    # Uncomment if you want it to run daily at 17:00 UTC

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Write service account key file
        run: |
          cat > service-account-key.json << 'EOL'
          ${{ secrets.SERVICE_ACCOUNT_JSON }}
          EOL

      - name: Verify service account JSON (debug)
        run: |
          echo "=== Service account file check ==="
          ls -l service-account-key.json
          python -c "
          import json
          with open('service-account-key.json') as f:
              data = json.load(f)
          print('Valid JSON ✓')
          print('Service account email:', data.get('client_email'))
          "

      - name: Run export script
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python export_to_drive.py
