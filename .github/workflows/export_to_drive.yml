name: Export HTCC Juniors Sessions to Google Drive

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Decode and write service account key
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > service-account-key.json

      - name: Verify service account JSON
        run: |
          echo "=== File size ==="
          ls -l service-account-key.json
          echo "=== First 3 lines ==="
          head -n 3 service-account-key.json
          echo "=== Valid JSON check ==="
          python -c '
import json, sys
try:
    with open("service-account-key.json") as f:
        data = json.load(f)
    print("Valid JSON ✓")
    print("Service account email:", data.get("client_email"))
except Exception as e:
    print("Invalid JSON ✗")
    print(e)
    sys.exit(1)
          '

      - name: Run export script
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python export_to_drive.py
