name: Auto-Update Junior Register

on:
  schedule:
    # All times in UTC. UK is BST (UTC+1) Apr–Oct, GMT (UTC+0) Oct–Apr.
    # Currently BST season — subtract 1 hour for UTC:
    - cron: '0 6 * * 1'   # Monday    06:00 UTC = 07:00 BST
    - cron: '0 6 * * 3'   # Wednesday 06:00 UTC = 07:00 BST
    - cron: '0 0 * * 0'   # Sunday    00:00 UTC = 01:00 BST

  # Also allows you to trigger a manual update from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-register:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python update_register.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update: junior register refreshed from Google Sheet [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new registrations found — index.html unchanged."
